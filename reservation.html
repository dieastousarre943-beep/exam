<body class="A">

    <header class="B">

        </div>

    <main class="ABC-container-form">
        <div class="ABC-card-form">
            <h2>Formulaire de Réservation</h2>
            <p>Remplissez les informations ci-dessous pour reserver votre table.</p>

            <form action="#">
                <div class="ABC-groupe">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom ici" required>
                </div>

                <div class="ABC-groupe">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="ABC-ligne">
                    <div class="ABC-groupe">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="ABC-groupe">
                        <label for="heure">Heure</label>
                        <input type="time" id="heure" name="heure" required>
                    </div>
                </div>

                <div class="ABC-groupe">
                    <label for="personnes">Nombre de personnes</label>
                    <select id="personnes" name="personnes">
                        <option value="1">1 Personne</option>
                        <option value="2" selected>2 Personnes</option>
                        <option value="4">4 Personnes</option>
                        <option value="6">6 Personnes et +</option>
                    </select>
                </div>

                <div class="ABC-groupe">
                    <label for="message">Demande spéciale </label>
                    <textarea id="message" name="message" rows="4" placeholder="Ex: Anniversaire, allergie..."></textarea>
                </div>

                <button type="submit" class="H">Confirmer la réservation</button>
            </form>
        </div>
    </main>
